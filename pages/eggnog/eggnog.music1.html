<html lang="en">

    <!--nav bar-->
    <div id="navbar"></div>
    <script>
        // Load navbar.html and inject it into the #navbar div
        fetch("../../navbar.html")

            .then(data => {

            .catch(error => console.error("Error loading navbar:", error));
    </script>
